<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain-Adaptive Enterprise Legal Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="main-container">
        <!-- Header Section -->
        <header class="chat-header">
            <div class="title-area">
                <h1>⚖️ Domain-Adaptive Legal AI </h1>
                <p>Enterprise LLM Assistant with RAG & Secure Memory</p>

            </div>
            <div class="actions" style="display: flex; gap: 10px; align-items: center; flex-direction: column;">
                <a href="/download" class="action-btn" title="Download simple transcript">
                    ⬇️ Raw Transcript
                </a>
                <button id="summarizeBtn" class="action-btn" style="background: var(--primary); cursor: pointer;"
                    title="Requires LLM processing!">
                    ✨ Summarize & Download
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="message ai">
                <div class="avatar">👨‍⚖️</div>
                <div class="bubble">
                    Hello! I am your Enterprise Legal Assistant. How can I help you today? I process data dynamically
                    via specialized domains like Cybercrime or IPC Sections.
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <form id="chatForm">
                <input type="text" id="userInput"
                    placeholder="Ask a legal query... (e.g. 'What is the penalty for hacking?')" autocomplete="off"
                    required>
                <button type="submit" id="sendBtn">Send</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sendBtn = document.getElementById('sendBtn');
        const summarizeBtn = document.getElementById('summarizeBtn');

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function createMessage(text, type = 'user') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = type === 'user' ? '👤' : '👨‍⚖️';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = text.replace(/\n/g, '<br>');

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatArea.appendChild(msgDiv);
            scrollToBottom();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            createMessage(message, 'user');
            userInput.value = '';

            const typingIndicatorId = "typing-" + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai typing-indicator';
            typingDiv.id = typingIndicatorId;
            typingDiv.innerHTML = `<div class="avatar">👨‍⚖️</div><div class="bubble">Thinking... <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>`;
            chatArea.appendChild(typingDiv);
            scrollToBottom();

            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                document.getElementById(typingIndicatorId).remove();

                if (data.clear_action) {
                    chatArea.innerHTML = `<div class="message ai"><div class="avatar">👨‍⚖️</div><div class="bubble">${data.response}</div></div>`;
                    return;
                }

                if (data.error) {
                    createMessage("Error: " + data.error, 'ai');
                } else {
                    createMessage(data.response, 'ai');
                }
            } catch (error) {
                document.getElementById(typingIndicatorId).remove();
                createMessage("Connection Error: Could not reach the backend.", 'ai');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        summarizeBtn.addEventListener('click', async () => {
            summarizeBtn.innerHTML = "⏳ Summarizing...";
            summarizeBtn.disabled = true;

            try {
                const resp = await fetch('/summarize_download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await resp.json();

                if (data.error) {
                    alert("Error: " + data.error);
                } else if (data.success) {
                    window.location.href = '/get_summarized_file';
                }
            } catch (e) {
                alert("Failed to summarize session.");
            } finally {
                summarizeBtn.innerHTML = "✨ Summarize & Download";
                summarizeBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
